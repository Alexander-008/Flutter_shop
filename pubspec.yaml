name: hm_shop
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.13.0-104.0.dev

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  carousel_slider: 5.1.2
  dio: 5.9.2
  geocoding: 4.0.0
  get: 4.7.3
  flutter_launcher_icons: 0.14.4
  shared_preferences: 2.5.5
  package_info_plus: 9.0.1
  geolocator: 14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/tabBar/
    - lib/assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#D92121"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
